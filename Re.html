        </nav>

        <div class="header-actions">
            <a href="#" class="btn btn-gold btn-glow">ابدأ استشارة الآن</a>
            <button class="menu-toggle" id="menuToggle" aria-label="تفعيل القائمة">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>
</header>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    const toggleIcon = menuToggle.querySelector('i');

    // وظيفة فتح وإغلاق القائمة عند الضغط على زر الـ Hamburger
    menuToggle.addEventListener('click', (e) => {
        e.stopPropagation(); // منع إغلاق القائمة فورًا عند الضغط على الزر نفسه
        navMenu.classList.toggle('mobile-open');
        
        // تغيير شكل الأيقونة بين القائمة (Bars) وعلامة الإغلاق (X)
        if (navMenu.classList.contains('mobile-open')) {
            toggleIcon.className = 'fas fa-times';
        } else {
            toggleIcon.className = 'fas fa-bars';
        }
    });

    // إغلاق القائمة تلقائيًا عند الضغط على أي رابط بداخلها
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            navMenu.classList.remove('mobile-open');
            toggleIcon.className = 'fas fa-bars';
            
            // تحويل الكلاس Active للرابط الذي تم ضغطه
            navLinks.forEach(nav => nav.classList.remove('active'));
            link.classList.add('active');
        });
    });

    // إغلاق القائمة عند الضغط في أي مكان خارجها (على الشاشة)
    document.addEventListener('click', (e) => {
        if (!navMenu.contains(e.target) && !menuToggle.contains(e.target)) {
            navMenu.classList.remove('mobile-open');
            toggleIcon.className = 'fas fa-bars';
        }
    });
});
    </script>

</body>
